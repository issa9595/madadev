name: Generate SEO blog post

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate article with Claude + Gemini
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push article
        run: |
          git config user.name "MadaDev Bot"
          git config user.email "bot@mada-dev.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "feat: nouvel article SEO auto"
          git push
